<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2d7a56">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="食事バランス">
  <link rel="manifest" href="meal-balance-helper.webmanifest">
  <link rel="icon" href="meal-balance-icon.svg" type="image/svg+xml">
  <title>食事バランスノート</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d2321;
      --muted: #63706b;
      --line: #dce4df;
      --paper: #f7faf8;
      --panel: #ffffff;
      --leaf: #2d7a56;
      --leaf-soft: #e7f4ed;
      --tomato: #c84d3d;
      --amber: #b7791f;
      --blue: #2f6f9f;
      --shadow: 0 18px 45px rgba(31, 45, 38, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      font-weight: 760;
    }

    .date-pill {
      min-width: 132px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .layout > *,
    .result-grid > * {
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 18px 0;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 750;
    }

    .panel-body {
      padding: 18px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .subsection-title {
      color: var(--ink);
      font-size: 14px;
      font-weight: 760;
      margin-bottom: 10px;
    }

    .health-fields {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbf9;
      padding: 12px;
    }

    .health-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .package-summary {
      cursor: pointer;
      margin-bottom: 0;
    }

    .package-box[open] .package-summary {
      margin-bottom: 10px;
    }

    .package-hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      margin: 0 0 12px;
    }

    .package-group-title {
      font-size: 13px;
      margin-top: 12px;
    }

    .package-actions {
      margin-top: 12px;
    }

    label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      outline: none;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--leaf);
      box-shadow: 0 0 0 3px rgba(45, 122, 86, 0.13);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      line-height: 1.55;
    }

    .full {
      grid-column: 1 / -1;
    }

    .photo-box {
      display: grid;
      gap: 10px;
    }

    .photo-input {
      min-height: 48px;
      padding: 11px;
    }

    .photo-preview {
      display: none;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #eef4f0;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }

    .button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      padding: 0 16px;
      cursor: pointer;
      font-weight: 740;
    }

    .button.primary {
      flex: 1;
      background: var(--leaf);
      color: white;
    }

    .button.secondary {
      background: #eef3f0;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric {
      min-height: 96px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .metric strong {
      font-size: 24px;
      line-height: 1;
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(260px, 0.95fr);
      gap: 18px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }

    th,
    td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      background: #f8fbf9;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 76px;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 760;
    }

    .status.low {
      background: #fff3d8;
      color: #7a4a00;
    }

    .status.ok {
      background: var(--leaf-soft);
      color: #1d6544;
    }

    .status.high {
      background: #ffe6e2;
      color: #9c2f22;
    }

    .suggestions {
      display: grid;
      gap: 10px;
    }

    .suggestion {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 13px;
      display: grid;
      gap: 8px;
    }

    .suggestion-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .suggestion strong {
      font-size: 15px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 4px 9px;
      background: var(--leaf-soft);
      color: #1d6544;
      font-size: 12px;
      font-weight: 760;
      white-space: nowrap;
    }

    .foods {
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .parsed {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .parsed-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .parsed-item small {
      color: var(--muted);
      text-align: right;
    }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .save-status {
      margin-top: 8px;
      color: var(--leaf);
      font-size: 12px;
      min-height: 18px;
    }

    .empty {
      min-height: 320px;
      display: grid;
      place-items: center;
      padding: 28px;
      border: 1px dashed #c9d6cf;
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    @media (max-width: 980px) {
      .layout,
      .result-grid {
        grid-template-columns: 1fr;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 620px) {
      .app {
        padding: 16px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      h1 {
        font-size: 24px;
      }

      .date-pill {
        width: 100%;
      }

      .field-grid,
      .summary-grid,
      .health-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <h1>食事バランスノート</h1>
      <div class="date-pill" id="todayLabel"></div>
    </div>

    <div class="layout">
      <section class="panel" aria-labelledby="profileTitle">
        <div class="panel-header">
          <h2 class="panel-title" id="profileTitle">今日の入力</h2>
        </div>
        <div class="panel-body">
          <form id="mealForm">
            <div class="field-grid">
              <label>
                年齢
                <input id="age" type="number" min="1" max="120" value="35" required>
              </label>
              <label>
                性別
                <select id="sex" required>
                  <option value="female">女性</option>
                  <option value="male">男性</option>
                </select>
              </label>
              <label>
                身長 cm
                <input id="height" type="number" min="80" max="230" value="160" required>
              </label>
              <label>
                体重 kg
                <input id="weight" type="number" min="20" max="250" value="55" required>
              </label>
              <label class="full">
                活動量
                <select id="activity">
                  <option value="1.35">低め</option>
                  <option value="1.55" selected>ふつう</option>
                  <option value="1.75">高め</option>
                </select>
              </label>
              <div class="full health-fields">
                <div class="subsection-title">Healthの数値入力</div>
                <div class="health-grid">
                  <label>
                    歩数
                    <input id="steps" type="number" min="0" max="100000" placeholder="例: 8000">
                  </label>
                  <label>
                    アクティブエネルギー kcal
                    <input id="activeEnergy" type="number" min="0" max="5000" placeholder="例: 350">
                  </label>
                  <label>
                    運動時間 分
                    <input id="exerciseMinutes" type="number" min="0" max="1440" placeholder="例: 30">
                  </label>
                </div>
              </div>
              <label class="full photo-box">
                食事写真
                <input class="photo-input" id="photo" type="file" accept="image/*">
                <img class="photo-preview" id="photoPreview" alt="食事写真のプレビュー">
              </label>
              <label class="full">
                食材メモ
                <textarea id="foodText" required>白ごはん 150g、焼き鮭 1切れ、味噌汁 1杯、ほうれん草のおひたし 1皿</textarea>
              </label>
              <details class="full health-fields package-box">
                <summary class="subsection-title package-summary">市販品の栄養成分表示から追加</summary>
                <p class="package-hint">パッケージに印刷されている数値を、実際に食べた1本・1食分のまま入力します。100ml当たりで書かれている場合は、飲んだ量に換算した数値を入れてください。空欄の項目は記録しません。</p>
                <label>
                  商品名
                  <input id="packageName" type="text" placeholder="例: プロテインバー">
                </label>
                <div class="subsection-title package-group-title">栄養成分表示</div>
                <div class="health-grid">
                  <label>
                    熱量 kcal
                    <input id="packageKcal" type="number" min="0" max="5000" step="0.1" placeholder="例: 200">
                  </label>
                  <label>
                    たんぱく質 g
                    <input id="packageProtein" type="number" min="0" max="500" step="0.1" placeholder="例: 15">
                  </label>
                  <label>
                    脂質 g
                    <input id="packageFat" type="number" min="0" max="500" step="0.1" placeholder="例: 8">
                  </label>
                  <label>
                    炭水化物 g
                    <input id="packageCarbs" type="number" min="0" max="1000" step="0.1" placeholder="例: 20">
                  </label>
                  <label>
                    食塩相当量 g
                    <input id="packageSalt" type="number" min="0" max="100" step="0.01" placeholder="例: 0.3">
                  </label>
                </div>
                <div class="subsection-title package-group-title">任意表示（記載があれば）</div>
                <div class="health-grid">
                  <label>
                    糖質・糖類 g
                    <input id="packageSugar" type="number" min="0" max="1000" step="0.1" placeholder="例: 12">
                  </label>
                  <label>
                    食物繊維 g
                    <input id="packageFiber" type="number" min="0" max="200" step="0.1" placeholder="例: 2">
                  </label>
                  <label>
                    カルシウム mg
                    <input id="packageCalcium" type="number" min="0" max="5000" step="1" placeholder="例: 120">
                  </label>
                  <label>
                    鉄 mg
                    <input id="packageIron" type="number" min="0" max="100" step="0.1" placeholder="例: 0.5">
                  </label>
                  <label>
                    ビタミンC mg
                    <input id="packageVitaminC" type="number" min="0" max="5000" step="1" placeholder="例: 30">
                  </label>
                  <label>
                    ビタミンD ug
                    <input id="packageVitaminD" type="number" min="0" max="500" step="0.1" placeholder="例: 1.5">
                  </label>
                </div>
                <div class="package-actions">
                  <button class="button secondary" type="button" id="packageAddButton">食材メモに追加</button>
                </div>
                <div class="save-status" id="packageStatus" aria-live="polite"></div>
              </details>
            </div>
            <div class="actions">
              <button class="button primary" type="submit">計算する</button>
              <button class="button secondary" type="button" id="sampleButton">例を入れる</button>
            </div>
          </form>
          <p class="note">写真はこの画面内の確認用です。栄養量は日常管理の目安で、診断や治療の代わりではありません。</p>
          <div class="save-status" id="saveStatus" aria-live="polite"></div>
        </div>
      </section>

      <section class="panel" aria-labelledby="resultTitle">
        <div class="panel-header">
          <h2 class="panel-title" id="resultTitle">今日の記録と明日の提案</h2>
        </div>
        <div class="panel-body">
          <div id="results" class="empty">入力後に、今日の摂取量と明日足したい栄養を表示します。</div>
        </div>
      </section>
    </div>
  </main>

    function getTargets(profile) {
      const base = 10 * profile.weight + 6.25 * profile.height - 5 * profile.age + (profile.sex === "male" ? 5 : -161);
      const estimatedKcal = Math.round(base * profile.activity);
      const healthAdjusted = profile.activeEnergy > 0;
      const kcal = healthAdjusted ? Math.round(base * 1.2 + profile.activeEnergy) : estimatedKcal;
      return {
        kcal,
        estimatedKcal,
        baseKcal: Math.round(base),
        healthAdjusted,
        protein: Math.max(profile.sex === "male" ? 65 : 50, Math.round(profile.weight * 1.0)),
        fiber: profile.sex === "male" ? 22 : 18,
        salt: profile.sex === "male" ? 7.5 : 6.5,
        calcium: profile.sex === "male" ? 750 : 650,
        iron: profile.sex === "female" && profile.age < 50 ? 10.5 : 7.5,
        vitaminC: 100,
        vitaminD: 9
      };
    }

    function parseFoods(text) {
      return splitFoodEntries(text)
        .map(part => stripMealHeading(normalizeFoodText(part)))
        .filter(part => part && !isMealHeading(part) && !isEmptyMealNote(part))
        .map(part => parseFoodItem(part));
    }

    function splitFoodEntries(text) {
      const entries = [];
      let current = "";
      let depth = 0;

      for (const char of text) {
        if (char === "(" || char === "（") depth += 1;
        if (char === ")" || char === "）") depth = Math.max(depth - 1, 0);

        if ((char === "、" || char === "," || char === "\n") && depth === 0) {
          entries.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      entries.push(current);
      return entries;
    }

    function normalizeFoodText(text) {
      return text
        .replace(/[０-９]/g, char => String.fromCharCode(char.charCodeAt(0) - 0xFEE0))
        .replace(/．/g, ".")
        .replace(/　/g, " ")
        .replace(/､/g, "、")
        .replace(/ｶﾛﾘｰ/gi, "カロリー")
        .replace(/ｇ/gi, "g")
        .replace(/ｍｌ/gi, "ml")
        .trim();
    }

    function stripMealHeading(text) {
      return text
        .replace(/^(朝食|朝ごはん|朝御飯|朝ご飯|昼食|昼ごはん|昼御飯|昼ご飯|夕食|夕ごはん|夕御飯|夕ご飯|夕飯|夜ごはん|夜御飯|夜ご飯|間食|おやつ|朝|昼|夜)\s*[:：]?\s*/, "")
        .trim();
    }

    function isMealHeading(text) {
      return /^(朝食|朝ごはん|朝御飯|朝ご飯|昼食|昼ごはん|昼御飯|昼ご飯|夕食|夕ごはん|夕御飯|夕ご飯|夕飯|夜ごはん|夜御飯|夜ご飯|間食|おやつ|朝|昼|夜)$/.test(text);
    }

    function isEmptyMealNote(text) {
      return /^(朝食|朝ごはん|朝|昼食|昼ごはん|昼|夕食|夕ごはん|夕飯|夜ごはん|夜|間食|おやつ)?\s*[:：]?\s*(なし|無し|食べてない|抜き)$/i.test(text);
    }

    function parseFoodItem(text) {
      text = normalizeFoodText(stripMealHeading(text));

      const manualNutrition = parseManualNutritionItem(text);
      if (manualNutrition) return manualNutrition;

      const calorieOnly = parseCalorieItem(text);
      if (calorieOnly) return calorieOnly;

      const dish = parseDishItem(text);
      if (dish) return dish;

      const genericBread = parseGenericBreadItem(text);
      if (genericBread) return genericBread;

      const match = findBestFoodMatch(text);
      if (!match) {
        return { raw: text, name: text, matched: false, estimated: true, grams: 0, amountLabel: "未登録" };
      }

      const gramsMatch = text.match(/(\d+(?:\.\d+)?)\s*(g|グラム)/i);
      const mlMatch = text.match(/(\d+(?:\.\d+)?)\s*(ml|ミリリットル)/i);
      const countMatch = text.match(/(\d+(?:\.\d+)?)\s*(個|枚|切れ|杯|皿|本|パック|袋|箱|粒|カップ)/);
      const spoonAmount = parseSpoonAmount(text, match);
      let grams = 0;
      let amountLabel = "";
      let estimated = false;

      if (gramsMatch) {
        grams = Number(gramsMatch[1]);
        amountLabel = `${grams}g`;
      } else if (mlMatch) {
        grams = Number(mlMatch[1]);
        amountLabel = `${grams}ml`;
      } else if (spoonAmount) {
        grams = spoonAmount.grams;
        amountLabel = spoonAmount.label;
        estimated = true;
      } else if (countMatch && match.gramsPerUnit) {
        const count = Number(countMatch[1]);
        grams = count * match.gramsPerUnit;
        amountLabel = `${count}${countMatch[2]}（約${grams}g）`;
        estimated = true;
      } else if (match.unit === "g" || match.unit === "ml") {
        grams = match.defaultAmount;
        amountLabel = `約${grams}${match.unit}`;
        estimated = true;
      } else if (match.gramsPerUnit) {
        grams = match.defaultAmount * match.gramsPerUnit;
        amountLabel = `約${match.defaultAmount}食分（${grams}g）`;
        estimated = true;
      }

      return {
        raw: text,
        name: match.name,
        matched: true,
        estimated,
        grams,
        amountLabel,
        nutrition: scaleNutrition(match, grams)
      };
    }

    function parseManualNutritionItem(text) {
      const patterns = [
        { key: "protein", label: "たんぱく質|タンパク質|蛋白質", unit: "g|グラム" },
        { key: "fat", label: "脂質", unit: "g|グラム" },
        { key: "sugar", label: "糖質|糖類", unit: "g|グラム" },
        { key: "carbs", label: "炭水化物", unit: "g|グラム" },
        { key: "fiber", label: "食物繊維", unit: "g|グラム" },
        { key: "salt", label: "食塩相当量|塩分|食塩", unit: "g|グラム" },
        { key: "calcium", label: "カルシウム", unit: "mg|ミリグラム" },
        { key: "iron", label: "鉄分|鉄", unit: "mg|ミリグラム" },
        { key: "vitaminC", label: "ビタミンC|ビタミンc", unit: "mg|ミリグラム" },
        { key: "vitaminD", label: "ビタミンD|ビタミンd", unit: "ug|μg|µg|マイクログラム" }
      ];
      const nutrition = Object.fromEntries(Object.keys(nutrientLabels).map(key => [key, 0]));
      const matchedTexts = [];

      const unitMatch = text.match(/(\d+(?:\.\d+)?)\s*(kcal|キロカロリー|カロリー)/i);
      const labelMatch = text.match(/(?:推定|目安)?\s*カロリー\s*(?:は|=|:|：)?\s*(\d+(?:\.\d+)?)/i);
      if (unitMatch || labelMatch) {
        nutrition.kcal = unitMatch ? Number(unitMatch[1]) : Number(labelMatch[1]);
        matchedTexts.push(unitMatch ? unitMatch[0] : labelMatch[0]);
      }

      patterns.forEach(pattern => {
        const regex = new RegExp(`(?:${pattern.label})\\s*(?:は|=|:|：)?\\s*(\\d+(?:\\.\\d+)?)\\s*(?:${pattern.unit})?`, "i");
        const match = text.match(regex);
        if (!match) return;
        nutrition[pattern.key] = Number(match[1]);
        matchedTexts.push(match[0]);
      });

      const hasManualNutrient = patterns.some(pattern => nutrition[pattern.key] > 0);
      if (!hasManualNutrient) return null;

      const name = matchedTexts
        .reduce((current, matched) => current.replace(matched, ""), text)
        .replace(/[()（）,、/／]/g, " ")
        .replace(/と$/g, "")
        .replace(/\s+/g, " ")
        .trim() || "栄養素入力";

      return {
        raw: text,
        name,
        matched: true,
        estimated: false,
        grams: 0,
        amountLabel: "栄養素手入力",
        nutrition
      };
    }

    function findBestFoodMatch(text) {
      return foods
        .filter(food => food.keys.some(key => text.includes(key)))
        .sort((a, b) => longestMatchedKeyLength(b, text) - longestMatchedKeyLength(a, text))[0];
    }

    function longestMatchedKeyLength(food, text) {
      return Math.max(...food.keys.filter(key => text.includes(key)).map(key => key.length));
    }

    function parseSpoonAmount(text, food) {
      const before = text.match(/(大さじ|大匙|小さじ|小匙)\s*(\d+(?:\.\d+)?)?/);
      const after = text.match(/(\d+(?:\.\d+)?)\s*(大さじ|大匙|小さじ|小匙)/);
      const match = before || after;
      if (!match) return null;

      const unit = before ? match[1] : match[2];
      const amount = Number(before ? (match[2] || 1) : match[1]);
      const gramsPerSpoon = /大/.test(unit)
        ? (food.spoonGramsPerTbsp || food.gramsPerUnit || 15)
        : (food.spoonGramsPerTsp || ((food.spoonGramsPerTbsp || food.gramsPerUnit) ? (food.spoonGramsPerTbsp || food.gramsPerUnit) / 3 : 5));
      const labelUnit = /大/.test(unit) ? "大さじ" : "小さじ";

      return {
        grams: amount * gramsPerSpoon,
        label: `${labelUnit}${amount}（約${amount * gramsPerSpoon}g）`
      };
    }

    function parseGenericBreadItem(text) {
      const cleaned = text.replace(/^(朝|昼|夜|間食)\s*[:：]\s*/, "").trim();
      const looksLikeBread = /パン|明太フランス|ガーリックフランス|チーズフランス|フランスパン|ベーグル|フォカッチャ|バゲット|バケット|ホットドッグ|ピザトースト|惣菜パン|調理パン/.test(cleaned);
      if (!looksLikeBread) return null;

      const knownBread = /クロワッサン|パンオショコラ|パン・オ・ショコラ|チョコクロワッサン|ロールパン|ベーグル|メロンパン|あんぱん|アンパン|クリームパン|ジャムパン|塩パン|フランスパン|バゲット|バケット|明太フランス|ガーリックフランス|ウインナーパン|ソーセージパン|焼きそばパン|やきそばパン|たまごパン|卵パン|チーズパン|フォカッチャ|スコーン|マフィン/.test(cleaned) || /^(食パン|トースト)(\s|$|[0-9０-９])/.test(cleaned);
      if (knownBread) return null;

      const countMatch = cleaned.match(/(\d+(?:\.\d+)?)\s*(個|本|枚|切れ)/);
      const count = countMatch ? Number(countMatch[1]) : 1;
      const portion = portionHints.find(hint => hint.pattern.test(cleaned));
      const multiplier = (portion ? portion.multiplier : 1) * count;
      const amountLabel = `${countMatch ? `${count}${countMatch[2]}` : "1個"}（未登録の調理パンとして推測）`;

      return {
        raw: text,
        name: cleaned || "調理パン",
        matched: true,
        estimated: true,
        grams: 0,
        amountLabel,
        nutrition: scaleDishNutrition({
          kcal: 350,
          protein: 8,
          fiber: 2,
          salt: 1.3,
          calcium: 35,
          iron: 1.0,
          vitaminC: 2,
          vitaminD: 0
        }, multiplier)
      };
    }

    function parseCalorieItem(text) {
      const unitMatch = text.match(/(\d+(?:\.\d+)?)\s*(kcal|キロカロリー|カロリー)/i);
      const labelMatch = text.match(/(?:推定|目安)?\s*カロリー\s*(?:は|=|:|：)?\s*(\d+(?:\.\d+)?)/i);
      const matchText = unitMatch ? unitMatch[0] : labelMatch ? labelMatch[0] : "";
      const kcal = unitMatch ? Number(unitMatch[1]) : labelMatch ? Number(labelMatch[1]) : 0;
      if (!matchText) return null;
      const name = text
        .replace(/^(朝食|朝ごはん|朝|昼食|昼ごはん|昼|夕食|夕ごはん|夕飯|夜ごはん|夜|間食|おやつ)\s*[:：]\s*/, "")
        .replace(matchText, "")
        .trim() || "カロリー入力";
      return {
        raw: text,
        name,
        matched: true,
        estimated: Boolean(labelMatch && !unitMatch),
        grams: 0,
        amountLabel: labelMatch && !unitMatch ? "推定カロリー入力" : "入力カロリー",
        nutrition: {
          kcal,
          protein: 0,
          fat: 0,
          sugar: 0,
          carbs: 0,
          fiber: 0,
          salt: 0,
          calcium: 0,
          iron: 0,
          vitaminC: 0,
          vitaminD: 0
        }
      };
    }

    function parseDishItem(text) {
      const match = dishes.find(dish => dish.keys.some(key => text.includes(key)));
      if (!match) return null;

      const portion = portionHints.find(hint => hint.pattern.test(text));
      const multiplier = portion ? portion.multiplier : 1;
      const portionLabel = portion ? portion.label : "一般的な量";
      const serving = getServingAmount(text, match.serving);
      const totalMultiplier = multiplier * serving.multiplier;

      return {
        raw: text,
        name: match.name,
        matched: true,
        estimated: true,
        grams: 0,
        amountLabel: `${serving.label}（${portionLabel}）`,
        nutrition: scaleDishNutrition(match, totalMultiplier)
      };
    }

    // dishes の値は serving（"6個" など）1つ分。入力の数量が serving と同じ単位なら
    // serving 側の個数で割って実数量に換算する（"餃子 6個" は 6人前ではなく 1人前）。
    // 単位が違うときは人前数とみなす（"餃子 2皿" は 2人前）。
    function getServingAmount(text, serving) {
      const match = text.match(/(\d+(?:\.\d+)?)\s*(皿|杯|食|人前|個|本|枚|切れ)/);
      if (!match) return { multiplier: 1, label: serving };

      const count = Number(match[1]);
      const unit = match[2];
      const base = serving.match(/^(\d+(?:\.\d+)?)\s*(.+)$/);
      const baseCount = base ? Number(base[1]) : 1;
      const baseUnit = base ? base[2].trim() : "";

      return {
        multiplier: unit === baseUnit && baseCount > 0 ? count / baseCount : count,
        label: `${count}${unit}`
      };
    }

    function scaleDishNutrition(dish, multiplier) {
      return Object.fromEntries(Object.keys(nutrientLabels).map(key => [key, (dish[key] || 0) * multiplier]));
    }

    function scaleNutrition(food, grams) {
      const ratio = grams / 100;
      return Object.fromEntries(Object.keys(nutrientLabels).map(key => [key, (food[key] || 0) * ratio]));
    }

    function sumNutrition(items) {
      return items.reduce((total, item) => {
        if (!item.nutrition) return total;
        Object.keys(nutrientLabels).forEach(key => {
          total[key] = (total[key] || 0) + (item.nutrition[key] || 0);
        });
        return total;
      }, {});
    }

    function renderResults(state) {
      const { profile, targets, totals, parsed } = state;
      const gaps = Object.keys(nutrientLabels).map(key => {
        const value = totals[key] || 0;
        const target = targets[key];
        const percent = target ? value / target : 0;
        return { key, value, target, percent };
      });

      const low = gaps
        .filter(item => item.target && item.key !== "salt" && item.percent < 0.75)
        .sort((a, b) => a.percent - b.percent)
        .slice(0, 5);

      results.className = "";
      results.innerHTML = `
        <div class="summary-grid">
          ${summaryMetric("今日の摂取", Math.round(totals.kcal || 0), "kcal")}
          ${summaryMetric(targets.healthAdjusted ? "今日の目標(活動反映)" : "今日の目標", targets.kcal, "kcal")}
          ${summaryMetric("今日のたんぱく質", round(totals.protein || 0, 1), "g")}
          ${summaryMetric("今日の食塩", round(totals.salt || 0, 1), "g")}
        </div>
        <div class="result-grid">
          <div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>栄養</th>
                    <th>今日の推定</th>
                    <th>目安</th>
                    <th>状態</th>
                  </tr>
                </thead>
                <tbody>
                  ${gaps.map(row => nutrientRow(row)).join("")}
                </tbody>
              </table>
            </div>
            <div class="parsed">
              ${parsed.map(item => parsedItem(item)).join("")}
            </div>
          </div>
          <div class="suggestions">
            ${tomorrowLead(low, gaps)}
            ${activityMessage(profile, targets)}
            ${low.length ? low.map(item => suggestionItem(item)).join("") : balancedMessage()}
            ${saltNotice(gaps.find(item => item.key === "salt"))}
          </div>
        </div>
      `;
    }

    function tomorrowLead(low, gaps) {
      const kcalGap = gaps.find(item => item.key === "kcal");
      const priority = low.map(item => nutrientLabels[item.key]).slice(0, 3).join("、");
      const energyText = kcalGap && kcalGap.percent < 0.75
        ? "活動量や今日の摂取量を見ると、明日は主食も少し意識するとよさそうです。"
        : "明日は不足しやすい栄養を足す方向で整えます。";

      return `
        <div class="suggestion">
          <div class="suggestion-top">
            <strong>明日の優先</strong>
            <span class="tag">食材提案</span>
          </div>
          <div class="foods">${priority ? `${priority}を中心に補う提案です。` : "今日は大きな不足が少なめです。"} ${energyText}</div>
        </div>
      `;
    }

    function activityMessage(profile, targets) {
      const hasHealthInput = profile.steps > 0 || profile.activeEnergy > 0 || profile.exerciseMinutes > 0;
      if (!hasHealthInput) return "";

      const level = getActivityLevel(profile);
      const targetNote = targets.healthAdjusted
        ? `アクティブエネルギー ${profile.activeEnergy} kcal を目標カロリーに反映しました。`
        : "アクティブエネルギー未入力のため、目標カロリーは活動量設定のままです。";
      const details = [
        profile.steps > 0 ? `歩数 ${profile.steps.toLocaleString("ja-JP")}歩` : "",
        profile.exerciseMinutes > 0 ? `運動 ${profile.exerciseMinutes}分` : "",
        profile.activeEnergy > 0 ? `活動 ${profile.activeEnergy} kcal` : ""
      ].filter(Boolean).join(" / ");

      return `
        <div class="suggestion">
          <div class="suggestion-top">
            <strong>明日の回復メモ</strong>
            <span class="tag">${level.tag}</span>
          </div>
          <div class="foods">${details}<br>${targetNote} ${level.title}だったので、${level.message}</div>
        </div>
      `;
    }

    function getActivityLevel(profile) {
      if (profile.activeEnergy >= 450 || profile.steps >= 9000 || profile.exerciseMinutes >= 45) {
        return {
          title: "よく動けた日",
          tag: "活動多め",
          message: "明日は主食とたんぱく質を少し足すと回復しやすいです。"
        };
      }
      if (profile.activeEnergy >= 200 || profile.steps >= 5000 || profile.exerciseMinutes >= 20) {
        return {
          title: "ほどよく活動",
          tag: "ふつう",
          message: "明日は不足している栄養を優先して整えるくらいで大丈夫です。"
        };
      }
      return {
        title: "軽めの活動",
        tag: "控えめ",
        message: "明日は食物繊維やたんぱく質を中心に、軽く整える提案に寄せます。"
      };
    }

    function summaryMetric(label, value, unit) {
      return `<div class="metric"><span>${label}</span><strong>${value}</strong><span>${unit}</span></div>`;
    }

    function nutrientRow(row) {
      const state = getStatus(row);
      const targetText = row.target ? `${formatValue(row.target, row.key)} ${units[row.key]}` : "-";
      return `
        <tr>
          <td>${nutrientLabels[row.key]}</td>
          <td>${formatValue(row.value, row.key)} ${units[row.key]}</td>
          <td>${targetText}</td>
          <td><span class="status ${state.className}">${state.label}</span></td>
        </tr>
      `;
    }

    function parsedItem(item) {
      const kcal = item.nutrition ? Math.round(item.nutrition.kcal) : "-";
      const suffix = item.estimated ? "推定" : "入力";
      const kcalLabel = item.estimated && kcal !== "-" ? `約${kcal}` : kcal;
      return `
        <div class="parsed-item">
          <span>${item.name}</span>
          <small>${item.amountLabel} / ${kcalLabel} kcal / ${suffix}</small>
        </div>
      `;
    }

    function suggestionItem(item) {
      const missing = Math.max(item.target - item.value, 0);
      return `
        <div class="suggestion">
          <div class="suggestion-top">
            <strong>明日足したい: ${nutrientLabels[item.key]}</strong>
            <span class="tag">目安 ${formatValue(missing, item.key)} ${units[item.key]}</span>
          </div>
          <div class="foods">${suggestions[item.key].join("、")} を候補にすると補いやすいです。</div>
        </div>
      `;
    }

    function balancedMessage() {
      return `
        <div class="suggestion">
          <div class="suggestion-top">
            <strong>明日は維持でOK</strong>
            <span class="tag">良好</span>
          </div>
          <div class="foods">野菜、豆類、魚、乳製品を少しずつ入れると、明日も整えやすいです。</div>
        </div>
      `;
    }

    function saltNotice(row) {
      if (!row || row.percent <= 1) return "";
      return `
        <div class="suggestion">
          <div class="suggestion-top">
            <strong>明日は塩分控えめ</strong>
            <span class="tag" style="background:#ffe6e2;color:#9c2f22;">調整</span>
          </div>
          <div class="foods">今日の食塩が多めです。明日は汁物、漬物、加工食品を少し控え、果物や野菜を足すと調整しやすいです。</div>
        </div>
      `;
    }

    function getStatus(row) {
      if (!row.target) return { label: "記録", className: "ok" };
      if (row.key === "salt") {
        if (row.percent > 1) return { label: "多め", className: "high" };
        return { label: "範囲内", className: "ok" };
      }
      if (row.percent < 0.75) return { label: "不足", className: "low" };
      if (row.percent > 1.35 && row.key === "kcal") return { label: "多め", className: "high" };
      return { label: "目安内", className: "ok" };
    }

    function formatValue(value, key) {
      if (key === "kcal" || key === "calcium" || key === "vitaminC") return Math.round(value);
      return round(value, 1);
    }

    function round(value, digits) {
      const scale = 10 ** digits;
      return Math.round(value * scale) / scale;
    }

    function buildPackageLine() {
      const parts = packageFieldMap
        .map(field => ({ field, value: document.querySelector(`#${field.id}`).value.trim() }))
        .filter(entry => entry.value !== "" && Number.isFinite(Number(entry.value)))
        .map(entry => `${entry.field.label}${Number(entry.value)}${entry.field.unit}`);
      if (!parts.length) return "";
      // 商品名の読点は splitFoodEntries に別項目として割られるため空白にする。
      const name = packageName.value.replace(/[、,\n]/g, " ").replace(/\s+/g, " ").trim();
      return [name, ...parts].filter(Boolean).join(" ");
    }

    function clearPackageFields() {
      packageName.value = "";
      packageFieldMap.forEach(field => {
        document.querySelector(`#${field.id}`).value = "";
      });
    }

    function saveDraft() {
      const draft = {};
      draftFieldIds.forEach(id => {
        const field = document.querySelector(`#${id}`);
        if (field) draft[id] = field.value;
      });
      localStorage.setItem(draftKey, JSON.stringify(draft));
      saveStatus.textContent = "入力内容をこの端末に保存しました";
    }

    function loadDraft() {
      const saved = localStorage.getItem(draftKey);
      if (!saved) return;
      try {
        const draft = JSON.parse(saved);
        draftFieldIds.forEach(id => {
          const field = document.querySelector(`#${id}`);
          if (field && draft[id] !== undefined) field.value = draft[id];
        });
        saveStatus.textContent = "前回の入力内容を読み込みました";
      } catch {
        localStorage.removeItem(draftKey);
      }
    }

    if ("serviceWorker" in navigator && location.protocol !== "file:") {
      navigator.serviceWorker.register("meal-balance-sw.js").catch(() => {});
    }

    loadDraft();
    form.requestSubmit();
  </script>
</body>
</html>
